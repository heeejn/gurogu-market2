<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>구로구마켓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ─── 리셋 & 기본 ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #D4537E; --pink-dark: #993556;
      --pink-bg: #FBEAF0; --pink-br: #ED93B1;
      --pur-bg: #EEEDFE; --pur: #534AB7; --pur-br: #AFA9EC; --pur-dark: #26215C;
      --teal-bg: #E1F5EE; --teal: #1D9E75; --teal-dark: #085041; --teal-br: #9FE1CB;
      --bg: #F7F8FA; --surface: #fff;
      --text: #1A1A2E; --text2: #4A5068; --text3: #9BA3B8;
      --br: #E8EAF0; --br2: #D0D5E8;
      --r: 14px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ─── 앱 래퍼 ─── */
    #app { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; position: relative; overflow: hidden; background: var(--bg); }

    /* ─── 화면 전환 ─── */
    .screen { position: absolute; inset: 0; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: none; transition: transform .3s cubic-bezier(.32,.72,0,1); will-change: transform; z-index: 1; }
    .screen.right { transform: translateX(100%); }
    .screen.left  { transform: translateX(-100%); pointer-events: none; }
    .screen.active { transform: translateX(0); z-index: 10; }
    .ptr { position: absolute; top: 0; left: 50%; transform: translate(-50%, -120%); z-index: 50; background: var(--surface); color: var(--pink-dark); border: .5px solid var(--pink-br); box-shadow: 0 6px 18px rgba(30,30,50,.08); border-radius: 999px; padding: 8px 13px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 6px; transition: transform .18s ease; pointer-events: none; }
    .ptr.show { transform: translate(-50%, 12px); }
    .ptr .spin { width: 14px; height: 14px; border: 2px solid var(--pink-br); border-top-color: var(--pink-dark); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ─── 헤더 ─── */
    .hdr { height: 56px; background: var(--surface); border-bottom: .5px solid var(--br); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; position: sticky; top: 0; z-index: 20; }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-mark { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #fff; display: flex; align-items: center; justify-content: center; }
    .logo-img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.38); display: block; }
    .logo-name { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
    .hdr-r { display: flex; gap: 6px; align-items: center; }
    .hbtn { display: flex; align-items: center; gap: 3px; border: .5px solid var(--br2); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--surface); color: var(--text2); font-family: inherit; -webkit-tap-highlight-color: transparent; transition: background .1s; }
    .hbtn:active { background: var(--bg); }
    .hbtn-pink { background: var(--pink-bg); color: var(--pink-dark); border-color: var(--pink-br); }
    .pill { display: flex; align-items: center; gap: 5px; background: var(--pur-bg); color: var(--pur-dark); border: .5px solid var(--pur-br); border-radius: 999px; padding: 4px 11px 4px 4px; font-size: 11px; font-weight: 800; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .pill-av { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; background: var(--pur); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .pill-av img { width: 100%; height: 100%; object-fit: cover; }

    /* ─── 서브 헤더 ─── */
    .sub-hdr { height: 56px; background: var(--surface); border-bottom: .5px solid var(--br); display: flex; align-items: center; gap: 10px; padding: 0 14px; position: sticky; top: 0; z-index: 20; }
    .back-btn { width: 32px; height: 32px; background: var(--bg); border: .5px solid var(--br); border-radius: 999px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .sub-title { font-size: 15px; font-weight: 800; flex: 1; }
    .sub-right { display: flex; gap: 6px; }

    /* ─── 히어로 ─── */
    .hero { background: var(--surface); padding: 14px 14px 13px; border-bottom: .5px solid var(--br); }
    .hero p { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 0; }
    .search-row { display: flex; gap: 7px; }
    .search-row input { flex: 1; height: 38px; border: .5px solid var(--br2); border-radius: 10px; padding: 0 12px; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; }
    .search-row input:focus { outline: none; border-color: var(--pink); }
    .search-row button { height: 38px; padding: 0 14px; background: var(--pink); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; }

    /* ─── 필터 / 탭 ─── */
    .filter-bar { display: flex; gap: 6px; padding: 10px 14px; background: var(--surface); border-bottom: .5px solid var(--br); overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip { padding: 8px 16px; border-radius: 999px; border: .5px solid var(--br); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; color: var(--text2); background: var(--surface); font-family: inherit; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; line-height: 1; }
    .chip.on { background: var(--pink-bg); color: var(--pink-dark); border-color: var(--pink-br); }
    .stat-tabs { display: flex; background: var(--surface); border-bottom: .5px solid var(--br); }
    .stab { flex: 1; text-align: center; padding: 9px 0; font-size: 13px; font-weight: 700; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; -webkit-tap-highlight-color: transparent; }
    .stab.on { color: var(--pink-dark); border-bottom-color: var(--pink); }

    /* ─── 그리드 ─── */
    .content { padding: 12px 14px 24px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .card { background: var(--surface); border-radius: var(--r); border: .5px solid var(--br); overflow: hidden; cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; }
    .card:active { opacity: .88; }
    .card-thumb { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--surface); }
    .photo-loading { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text3); background: linear-gradient(135deg, #F8F9FB, #EEF1F5); font-size: 26px; }
    .card-body { padding: 8px 9px 10px; border-top: .5px solid var(--br); }
    .card-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-price { font-size: 13px; font-weight: 800; color: var(--pink-dark); }
    .card-sub { font-size: 10px; color: var(--text3); margin-top: 5px; display: flex; align-items: center; justify-content: space-between; }
    .card-sub-l { display: flex; align-items: center; gap: 3px; }
    .card-sub-r { display: flex; align-items: center; gap: 6px; }
    .card-stat { display: flex; align-items: center; gap: 2px; }
    .mini-av { width: 13px; height: 13px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--pur-bg); display: flex; align-items: center; justify-content: center; font-size: 6px; font-weight: 800; color: var(--pur); }
    .mini-av img { width: 100%; height: 100%; object-fit: cover; }
    .heart-btn { position: absolute; top: 6px; right: 6px; background: var(--surface); border: .5px solid var(--br); border-radius: 999px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; -webkit-tap-highlight-color: transparent; }
    .sold-badge { position: absolute; top: 6px; left: 6px; background: rgba(20,20,40,.55); color: #fff; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 999px; }
    .mine-badge { position: absolute; top: 6px; left: 6px; background: var(--pink); color: #fff; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 999px; }
    .empty { text-align: center; padding: 40px 0; color: var(--text3); font-size: 13px; font-weight: 700; line-height: 2.4; grid-column: span 2; }

    /* ─── 상품 상세 ─── */
    .det-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: var(--surface); }
    .det-gallery::-webkit-scrollbar { display: none; }
    .det-img { width: 100%; flex: 0 0 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 72px; overflow: hidden; scroll-snap-align: start; }
    .det-img img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--surface); }
    .det-content { background: var(--surface); padding: 14px; }
    .det-price { font-size: 22px; font-weight: 800; color: var(--pink-dark); margin-bottom: 3px; }
    .det-title { font-size: 15px; font-weight: 800; margin-bottom: 5px; }
    .det-stats { display: flex; gap: 12px; margin-bottom: 8px; }
    .det-stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); font-weight: 700; }
    .det-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
    .det-seller { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; padding: 10px 12px; background: var(--bg); border-radius: 10px; border: .5px solid var(--br); }
    .det-sav { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; background: var(--pur-bg); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--pur-dark); flex-shrink: 0; }
    .det-sav img { width: 100%; height: 100%; object-fit: cover; }
    .det-sname { font-size: 12px; font-weight: 800; }
    .det-time { font-size: 11px; color: var(--text3); margin-left: auto; }
    .wish-btn { background: var(--surface); border: .5px solid var(--br2); border-radius: 10px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .wish-btn.on { border-color: var(--pink-br); }
    .own-actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; margin-bottom: 13px; }
    .own-actions button { min-width: 0; margin-bottom: 0; white-space: normal; line-height: 1.25; text-align: center; }
    .sold-tog { width: 100%; background: var(--bg); border: .5px solid var(--br2); color: var(--text2); border-radius: 10px; padding: 10px 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 13px; }
    .edit-item-btn { width: 100%; background: var(--teal-bg); border: .5px solid var(--teal-br); color: var(--teal-dark); border-radius: 10px; padding: 10px 6px; font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 13px; }
    .del-item-btn { width: 100%; background: #FFF5F6; border: .5px solid #F2B8C2; color: #B4233B; border-radius: 10px; padding: 10px 6px; font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 13px; }
    .del-item-btn:disabled { opacity: .6; cursor: default; }

    /* ─── 댓글 ─── */
    .cmt-wrap { border-top: .5px solid var(--br); padding-top: 13px; }
    .cmt-head { font-size: 13px; font-weight: 800; margin-bottom: 10px; }
    .cmt-form { display: flex; gap: 6px; margin-bottom: 11px; }
    .cmt-inp { flex: 1; height: 38px; border: .5px solid var(--br2); border-radius: 10px; padding: 0 12px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
    .cmt-inp:focus { outline: none; border-color: var(--pink); }
    .cmt-post { background: var(--pink-bg); color: var(--pink-dark); border: .5px solid var(--pink-br); border-radius: 10px; padding: 0 13px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .cmt-list { display: flex; flex-direction: column; gap: 7px; }
    .cmt-item { background: var(--bg); border-radius: 10px; padding: 9px 11px; border: .5px solid var(--br); }
    .cmt-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .cmt-av { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--pur-bg); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: var(--pur); }
    .cmt-av img { width: 100%; height: 100%; object-fit: cover; }
    .cmt-nick { font-size: 12px; font-weight: 800; color: var(--pink-dark); }
    .cmt-time { font-size: 10px; color: var(--text3); margin-left: auto; }
    .cmt-text { font-size: 13px; line-height: 1.5; margin-bottom: 6px; }
    .cmt-acts { display: flex; gap: 8px; }
    .ca { background: none; border: none; font-size: 11px; color: var(--text3); cursor: pointer; padding: 0; font-family: inherit; font-weight: 700; }
    .ca:active { color: var(--pink-dark); }
    .rep-form { display: flex; gap: 5px; margin-top: 8px; }
    .rep-inp { flex: 1; height: 32px; border: .5px solid var(--br2); border-radius: 8px; padding: 0 10px; font-size: 12px; font-family: inherit; color: var(--text); background: var(--surface); }
    .rep-inp:focus { outline: none; border-color: var(--teal); }
    .rep-post { background: var(--teal-bg); color: var(--teal-dark); border: .5px solid var(--teal-br); border-radius: 8px; padding: 0 11px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .replies { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
    .rep-item { background: var(--surface); border-radius: 8px; padding: 7px 10px; border: .5px solid var(--br); margin-left: 12px; }
    .rep-nick { font-size: 11px; font-weight: 800; color: var(--teal-dark); }
    .rep-text { font-size: 12px; margin-top: 2px; }
    .rep-acts { display: flex; gap: 6px; margin-top: 4px; }
    .ei { width: 100%; height: 28px; border: .5px solid var(--br2); border-radius: 6px; padding: 0 9px; font-size: 12px; font-family: inherit; color: var(--text); margin-bottom: 4px; background: var(--surface); }

    /* ─── 마이페이지 ─── */
    .prof-card { margin: 12px 14px; background: var(--pur-bg); border: .5px solid var(--pur-br); border-radius: var(--r); padding: 14px; display: flex; align-items: center; gap: 12px; }
    .prof-av-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
    .prof-av { width: 52px; height: 52px; border-radius: 50%; background: var(--pur); overflow: hidden; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; }
    .prof-av img { width: 100%; height: 100%; object-fit: cover; }
    .prof-cam { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; background: var(--pink); border-radius: 50%; border: 1.5px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
    .prof-info h3 { font-size: 14px; font-weight: 800; color: var(--pur-dark); }
    .prof-info p { font-size: 11px; color: var(--pur); margin-top: 1px; }
    .edit-nick-btn { margin-left: auto; background: var(--surface); border: .5px solid var(--pur-br); border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--pur-dark); font-family: inherit; }
    .edit-form { display: none; margin: 0 14px 10px; background: var(--surface); border: .5px solid var(--br); border-radius: 12px; padding: 11px 12px; }
    .edit-form.open { display: block; }
    .edit-label { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 5px; }
    .edit-row { display: flex; gap: 6px; }
    .edit-row input { flex: 1; height: 34px; border: .5px solid var(--br2); border-radius: 8px; padding: 0 10px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
    .edit-row input:focus { outline: none; border-color: var(--pink); }
    .save-btn { background: var(--pink); color: #fff; border: none; border-radius: 8px; height: 34px; padding: 0 13px; font-size: 13px; font-weight: 800; cursor: pointer; }
    .stats { display: flex; gap: 7px; padding: 0 14px 12px; }
    .stat { flex: 1; background: var(--surface); border: .5px solid var(--br); border-radius: 12px; padding: 10px; text-align: center; }
    .stat-n { font-size: 18px; font-weight: 800; color: var(--pink-dark); }
    .stat-l { font-size: 10px; color: var(--text3); font-weight: 700; margin-top: 2px; }
    .my-tabs { display: flex; background: var(--surface); border-bottom: .5px solid var(--br); }
    .my-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 12px; font-weight: 700; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; -webkit-tap-highlight-color: transparent; }
    .my-tab.on { color: var(--pink-dark); border-bottom-color: var(--pink); }
    .my-body { padding: 10px 0 24px; }
    .item-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-bottom: .5px solid var(--br); padding: 11px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .item-row:active { background: var(--bg); }
    .item-row-em { font-size: 20px; width: 40px; height: 40px; background: var(--bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .item-row-em img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--surface); }
    .item-row-info { flex: 1; min-width: 0; }
    .item-row-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-row-price { font-size: 12px; font-weight: 800; color: var(--pink-dark); margin-top: 1px; }
    .item-row-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .status-pill { font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; flex-shrink: 0; }
    .sp-on { background: var(--teal-bg); color: var(--teal-dark); }
    .sp-off { background: var(--bg); color: var(--text3); border: .5px solid var(--br); }
    .empty-my { text-align: center; padding: 40px 14px; color: var(--text3); font-size: 13px; font-weight: 700; line-height: 2.4; }

    /* ─── 판매 등록 ─── */
    .sell-body { padding: 14px; }
    .fr { margin-bottom: 10px; }
    .fr label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; }
    .fr input, .fr select, .fr textarea { width: 100%; border: .5px solid var(--br2); border-radius: 10px; padding: 9px 11px; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; resize: none; }
    .fr textarea { height: 80px; }
    .fr input:focus, .fr select:focus, .fr textarea:focus { outline: none; border-color: var(--pink); background: var(--surface); }
    .img-zone { width: 100%; min-height: 132px; border: 1px dashed var(--br2); border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text3); font-size: 13px; font-weight: 700; cursor: pointer; background: var(--bg); overflow: hidden; }
    .img-zone.has-img { align-items: stretch; justify-content: flex-start; border-style: solid; padding: 8px; background: var(--surface); overflow-x: auto; }
    .img-zone.has-img::-webkit-scrollbar { display: none; }
    .photo-preview { width: 112px; aspect-ratio: 1; border: .5px solid var(--br); border-radius: 10px; overflow: hidden; background: var(--bg); flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
    .photo-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .reg-btn { width: 100%; background: var(--pink); color: #fff; border: none; border-radius: 10px; height: 46px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .reg-btn:active { background: var(--pink-dark); }

    /* ─── 닉네임 설정 ─── */
    .nick-screen { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px 14px; }
    .nick-box { background: var(--surface); border-radius: 20px; width: 100%; max-width: 320px; padding: 28px 22px; text-align: center; border: .5px solid var(--br); }
    .nick-emoji { font-size: 34px; margin-bottom: 10px; }
    .nick-box h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .nick-box p { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
    .av-pick { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 16px; }
    .av-circle { width: 66px; height: 66px; border-radius: 50%; background: var(--pur-bg); border: 1.5px dashed var(--pur-br); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
    .av-circle img { width: 100%; height: 100%; object-fit: cover; }
    .av-hint { font-size: 11px; color: var(--text3); font-weight: 700; }
    .nick-input { width: 100%; height: 42px; border: .5px solid var(--br2); border-radius: 10px; text-align: center; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); margin-bottom: 12px; }
    .nick-input:focus { outline: none; border-color: var(--pink); }
    .nick-start { width: 100%; background: var(--pink); color: #fff; border: none; border-radius: 10px; height: 44px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .nick-start:active { background: var(--pink-dark); }

    /* ─── 로딩 ─── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; color: var(--text3); font-size: 13px; font-weight: 700; grid-column: span 2; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--br2); border-top-color: var(--pink); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 토스트 ─── */
    .toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }
    .toast { background: var(--text); color: #fff; font-size: 12px; font-weight: 700; padding: 9px 18px; border-radius: 999px; font-family: inherit; white-space: nowrap; opacity: 0; transform: translateY(16px); transition: opacity .25s, transform .25s; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

    if (parsed && Array.isArray(parsed.photos)) return parsed.photos.filter(isPhotoRef);
    return Array.isArray(parsed) ? parsed.filter(isPhotoRef) : [];
  } catch (e) {
    return [];
  }
}
function itemPayload(photos, category, thumbs = []) {
  return photos.length ? JSON.stringify({ photos, thumbs: thumbs.length ? thumbs : photos }) : (emM[category] || '📦');
}
function getCachedThumb(id) {
  try { return localStorage.getItem(PHOTO_CACHE_PREFIX + id) || ''; }
  catch (e) { return ''; }
}
function getCachedThumbs(id) {
  const raw = getCachedThumb(id);
  if (!raw) return [];
  if (isImg(raw)) return [raw];
  try {
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.filter(isImg) : [];
  } catch (e) {
    return [];
  }
}
function cachedThumbPayload(id) {
  const thumbs = getCachedThumbs(id);
  return thumbs.length ? JSON.stringify({ photos: [], thumbs, thumbOnly: true }) : '';
}
function isThumbOnlyPayload(v) {
  if (typeof v !== 'string' || v[0] !== '{') return false;
  try { return !!JSON.parse(v).thumbOnly; }
  catch (e) { return false; }
}
function plainEmoji(v) {
  return typeof v === 'string' && v && !isPhotoRef(v) && v[0] !== '[' && v[0] !== '{' ? v : '';
}
function rememberItemThumb(id, thumb) {
  if (!id || !thumb) return;
  try { localStorage.setItem(PHOTO_CACHE_PREFIX + id, thumb); }
  catch (e) { console.warn('썸네일 캐시 저장 실패', e); }
}
function rememberItemThumbs(id, thumbs) {
  const clean = (thumbs || []).filter(isPhotoRef);
  if (!id || !clean.length) return;
  try { localStorage.setItem(PHOTO_CACHE_PREFIX + id, JSON.stringify(clean)); }
  catch (e) { rememberItemThumb(id, clean[0]); }
}
function itemRecordPayload(item) {
  const photos = Array.isArray(item?.photo_urls) ? item.photo_urls.filter(isPhotoRef) : [];
  const thumbs = item?.thumbnail_url ? [item.thumbnail_url] : [];
  return photos.length || thumbs.length ? itemPayload(photos, item.category, thumbs) : '';
}
function getCachedComments(id) {
  try {
    const raw = localStorage.getItem(COMMENT_CACHE_PREFIX + id);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || Date.now() - parsed.savedAt > 5 * 60 * 1000) return null;
    return Array.isArray(parsed.comments) ? parsed.comments : null;
  } catch (e) {
    return null;
  }
}
function rememberComments(id, comments) {
  try {
    localStorage.setItem(COMMENT_CACHE_PREFIX + id, JSON.stringify({ savedAt: Date.now(), comments }));
  } catch (e) {
    console.warn('댓글 캐시 저장 실패', e);
  }
}
function forgetCachedComments(id) {

  catch (e) {}
}
function itemMedia(v, category) {

  return thumbs.length ? `<img src="${thumbs[0]}" alt="상품 사진">` : '<div class="photo-loading"><i class="ti ti-photo" aria-hidden="true"></i></div>';
}
function itemGallery(v, category) {
  const photos = itemPhotoList(v);

  if (!photos.length && thumbs.length) {

  }

}
function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

function relTime(ts) {

  if (d < 60) return '방금';
  if (d < 3600) return Math.floor(d / 60) + '분 전';
  if (d < 86400) return Math.floor(d / 3600) + '시간 전';

const allScreens = ['s-nick', 's-main', 's-det', 's-my', 's-sell'];
function goTo(id) {
  const cur = screenHistory[screenHistory.length - 1];
  if (cur === id) return;
  document.getElementById(cur).className = 'screen left';
  document.getElementById(id).className = 'screen active';
  allScreens.filter(s => s !== cur && s !== id).forEach(s => {
    document.getElementById(s).className = 'screen right';
  });
  screenHistory.push(id);
}
function goBack() {
  if (screenHistory.length <= 1) return;
  const cur = screenHistory.pop();
  const prev = screenHistory[screenHistory.length - 1];
  document.getElementById(cur).className = 'screen right';
  document.getElementById(prev).className = 'screen active';
  if (prev === 's-main') {
    renderMainList();
    hydrateMainMeta(document.getElementById('_sq')?.value || '');
  }
  if (prev === 's-my') renderMy();
}

function activeScreenEl() {
  return document.querySelector('.screen.active');
}

let ptrStartY = 0;
let ptrStartX = 0;
let ptrPulling = false;
let ptrRefreshing = false;

function setPullRefresh(show, text = '새로고침') {
  const el = document.getElementById('ptr');
  if (!el) return;
  el.querySelector('span').textContent = text;
  el.classList.toggle('show', show);
}

function canStartPullRefresh(e) {
  if (ptrRefreshing || e.touches.length !== 1) return false;
  const active = activeScreenEl();
  if (!active || active.scrollTop > 0) return false;
  if (e.target.closest('.det-gallery, .det-img, input, textarea, select, .img-zone')) return false;
  return screenHistory[screenHistory.length - 1] === 's-main' || screenHistory[screenHistory.length - 1] === 's-my';
}

async function refreshActiveScreen() {
  if (ptrRefreshing) return;
  ptrRefreshing = true;
  setPullRefresh(true, '새로고침 중...');
  try {
    if (screenHistory[screenHistory.length - 1] === 's-main') {
      cachedItems = [];
      await renderMain(document.getElementById('_sq')?.value || '');
    } else if (screenHistory[screenHistory.length - 1] === 's-my') {
      await renderMy();
    } else if (screenHistory[screenHistory.length - 1] === 's-det' && curId) {
      commentCache.delete(curId);
      const id = curId;
      await hydrateItemPhotos(id);
      await loadComments(id, true);
      if (curId === id) await openDet(id);
    }
  } finally {
    ptrRefreshing = false;
    setPullRefresh(false);
  }
}

document.getElementById('app').addEventListener('touchstart', e => {
  if (!canStartPullRefresh(e)) return;
  ptrStartX = e.touches[0].clientX;
  ptrStartY = e.touches[0].clientY;
  ptrPulling = true;
}, { passive: true });

document.getElementById('app').addEventListener('touchmove', e => {
  if (!ptrPulling || ptrRefreshing || e.touches.length !== 1) return;
  const active = activeScreenEl();
  if (!active || active.scrollTop > 0) { ptrPulling = false; return; }
  const dx = Math.abs(e.touches[0].clientX - ptrStartX);
  const dy = e.touches[0].clientY - ptrStartY;
  if (dx > 28 || dy < 0) { ptrPulling = false; setPullRefresh(false); return; }
  if (dy > 12) e.preventDefault();
  if (dy > 64) setPullRefresh(true, '놓으면 새로고침');
}, { passive: false });

document.getElementById('app').addEventListener('touchend', e => {
  if (!ptrPulling || ptrRefreshing) return;
  ptrPulling = false;
  const dx = Math.abs((e.changedTouches[0]?.clientX || 0) - ptrStartX);
  const dy = (e.changedTouches[0]?.clientY || 0) - ptrStartY;
  if (dy > 88 && dx < 28) refreshActiveScreen();
  else setPullRefresh(false);
}, { passive: true });

/* ── 파일 업로드 → Base64 ── */
function readFile(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}
function readItemImage(file, max = 900, quality = .78) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => res(e.target.result);
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}
function readItemImageBoth(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const resize = (max, quality) => {
          const scale = Math.min(1, max / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          return c.toDataURL('image/jpeg', quality);
        };
        res({ photo: resize(1400, .88), thumb: resize(520, .76) });
      };
      img.onerror = () => res({ photo: e.target.result, thumb: e.target.result });
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}
function makeThumbFromDataUrl(src, max = 360, quality = .68) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      res(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => res(src);
    img.src = src;
  });
}
async function dataUrlToBlob(dataUrl) {
  return (await fetch(dataUrl)).blob();
}
async function uploadImageDataUrl(dataUrl, folder = 'items') {
  if (isImgUrl(dataUrl)) return dataUrl;
  const blob = await dataUrlToBlob(dataUrl);
  const path = `${folder}/${userKey}/${Date.now()}-${crypto.randomUUID()}.jpg`;
  const { error } = await sb.storage
    .from('item-images')
    .upload(path, blob, { contentType: 'image/jpeg', upsert: false });
  if (error) throw error;
  const { data } = sb.storage.from('item-images').getPublicUrl(path);
  return data.publicUrl;
}
async function uploadItemImages(photos, thumbs) {
  const [photoUrls, thumbUrl] = await Promise.all([
    Promise.all(photos.map(p => isImgUrl(p) ? p : uploadImageDataUrl(p, 'items'))),
    thumbs[0] ? (isImgUrl(thumbs[0]) ? Promise.resolve(thumbs[0]) : uploadImageDataUrl(thumbs[0], 'thumbs')) : Promise.resolve(''),
  ]);
  return { photoUrls, thumbnailUrl: thumbUrl || photoUrls[0] || '' };
}

function mergeFetchedItems(freshItems) {
  const oldById = new Map(cachedItems.map(i => [i.id, i]));
  return freshItems.map(i => {
    const old = oldById.get(i.id);
    if (!old) return i;
    const oldHasMedia = itemThumbList(old.emoji).length || itemPhotoList(old.emoji).length;
    const freshHasMedia = itemThumbList(i.emoji).length || itemPhotoList(i.emoji).length;
    return {
      ...i,
      emoji: oldHasMedia && !freshHasMedia ? old.emoji : i.emoji,
      seller_photo: old.seller_photo || i.seller_photo,
      likeCount: old.likeCount || i.likeCount || 0,
      commentCount: old.commentCount || i.commentCount || 0,
    };
  });
}

async function fetchItemCounts(items) {
  const ids = items.map(i => i.id);
  const empty = { likes: new Map(), comments: new Map() };
  if (!ids.length) return empty;

  const [likesRes, commentsRes] = await Promise.all([
    sb.from('likes').select('item_id').in('item_id', ids),
    sb.from('comments').select('item_id').in('item_id', ids),
  ]);
  if (likesRes.error) console.error(likesRes.error);
  if (commentsRes.error) console.error(commentsRes.error);

  const likes = new Map();
  const comments = new Map();
  (likesRes.data || []).forEach(l => likes.set(l.item_id, (likes.get(l.item_id) || 0) + 1));
  (commentsRes.data || []).forEach(c => comments.set(c.item_id, (comments.get(c.item_id) || 0) + 1));
  return { likes, comments };
}

async function hydrateItemPhotos(id, q) {
  const existing = cachedItems.find(i => i.id === id);
  const hasFullPhotos = itemPhotoList(existing?.emoji).length && !isThumbOnlyPayload(existing?.emoji);
  if (hydratedPhotoIds.has(id) || hasFullPhotos) return existing;
  if (photoHydrationPromises.has(id)) return photoHydrationPromises.get(id);

  const promise = (async () => {
    hydratingPhotoIds.add(id);
    let { data, error } = await sb
      .from('items')
      .select('id,emoji,seller_photo,category,thumbnail_url,photo_urls')
      .eq('id', id)
      .single();
    if (error?.code === '42703') {
      const fallback = await sb
        .from('items')
        .select('id,emoji,seller_photo,category')
        .eq('id', id)
        .single();
      data = fallback.data;
      error = fallback.error;
    }
    hydratingPhotoIds.delete(id);
    if (error || !data) return existing;

    let nextEmoji = itemRecordPayload(data) || data.emoji || '';
    const photos = itemPhotoList(nextEmoji);
    let thumbs = itemThumbList(nextEmoji);
    if (photos.length && (!thumbs.length || thumbs[0] === photos[0] || thumbs[0].length > 140000 || thumbs.length < photos.length)) {
      thumbs = await Promise.all(photos.map(p => makeThumbFromDataUrl(p)));
      nextEmoji = itemPayload(photos, data.category || existing?.category || '기타', thumbs);
      sb.from('items').update({ emoji: nextEmoji }).eq('id', id).then(({ error }) => {
        if (error) console.warn('썸네일 저장 실패', error);
      });
    }
    if (thumbs[0]) rememberItemThumbs(id, thumbs);
    hydratedPhotoIds.add(id);

    const merged = {
      ...(existing || {}),
      ...data,
      emoji: nextEmoji,
      seller_photo: data.seller_photo || existing?.seller_photo || '',
    };
    cachedItems = cachedItems.map(i => i.id === id ? { ...i, ...merged } : i);
    if (q !== undefined) renderMainList(q);
    return merged;
  })();

  photoHydrationPromises.set(id, promise);
  promise.finally(() => photoHydrationPromises.delete(id));
  return promise;
}

function renderMainList(q) {
  q = q !== undefined ? q : (document.getElementById('_sq')?.value || '');

  let list = filterMainItems(q);

  const grid = document.querySelector('#s-main .grid');
  if (!grid) return;
  grid.innerHTML = list.length
    ? list.map(i => cardH(i, likedItemIds.has(i.id))).join('')
    : `<div class="empty">조건에 맞는 상품이 없어요 🥲</div>`;
  prefetchSoon(q);
}

let prefetchTimer;
function prefetchSoon(q) {
  clearTimeout(prefetchTimer);
  prefetchTimer = setTimeout(() => prefetchVisibleDetails(q), 80);
}

function filterMainItems(q) {
  q = q !== undefined ? q : (document.getElementById('_sq')?.value || '');
  return cachedItems.filter(i => {
    const mc = catF === '전체' || i.category === catF;
    const ms = statF === '전체' || (statF === '판매중' && !i.sold) || (statF === '판매완료' && i.sold);
    const mq = !q || i.title.includes(q);
    return mc && ms && mq;
  });
}

async function openDet(id) {
  curId = id;
  curItem = cachedItems.find(i => i.id === id);
  if (!curItem) curItem = { id, title: '상품', price: 0, category: '기타', emoji: '📦', seller_name: '', description: '' };

  const hasFullPhotos = itemPhotoList(curItem.emoji).length && !isThumbOnlyPayload(curItem.emoji);
  const hasThumbs = itemThumbList(curItem.emoji).length > 0;
  const needsFullPhotos = !hasFullPhotos && !hasThumbs && !plainEmoji(curItem.emoji);
  if (needsFullPhotos) {
    renderDetLoading(curItem);
    goTo('s-det');
    try {
      loadCommentsData(id);
      const photoItem = await hydrateItemPhotos(id);
      if (curId !== id) return;
      curItem = { ...(curItem || {}), ...(photoItem || {}) };
      renderDet();
    } catch (e) {
      console.error(e);
      renderDet();
    }
  } else {
    renderDet();
    goTo('s-det');
  }

  try {
    const { data } = await sb.from('items').select('*').eq('id', id).single();
    if (!data || curId !== id) return;
    const dataEmoji = itemRecordPayload(data) || data.emoji;
    const thumbs = itemThumbList(dataEmoji);
    if (thumbs[0]) rememberItemThumbs(id, thumbs);
    curItem = {
      ...(curItem || {}),
      ...data,
      emoji: dataEmoji,
      likeCount: curItem?.likeCount || 0,
      commentCount: curItem?.commentCount || 0,
    };
    cachedItems = cachedItems.map(i => i.id === id ? { ...i, ...curItem } : i);
    renderDet();
    fetchLikeCount(id).then(likeCount => {
      if (curId !== id || !curItem) return;
      curItem.likeCount = likeCount;
      cachedItems = cachedItems.map(i => i.id === id ? { ...i, likeCount } : i);
      const heart = document.getElementById('_det-like-cnt');
      if (heart) heart.textContent = curItem.likeCount;
    });
  } catch (e) {
    console.error(e);
  }
}

async function loadComments(itemId = curId, force = false) {
  if (!itemId) return;
  const cmts = await loadCommentsData(itemId, force);
  renderComments(itemId, cmts);
}

async function loadCommentsData(itemId, force = false) {
  if (!force && commentCache.has(itemId)) {
    const cached = commentCache.get(itemId);
    renderComments(itemId, cached);
    return cached;
  }
  const localCached = !force ? getCachedComments(itemId) : null;
  if (localCached) {
    commentCache.set(itemId, localCached);
    renderComments(itemId, localCached);
  }
  if (!force && commentPromises.has(itemId)) return commentPromises.get(itemId);

  commentsLoading.add(itemId);
  const promise = fetchComments(itemId).then(cmts => {
    commentsLoading.delete(itemId);
    commentCache.set(itemId, cmts);
    rememberComments(itemId, cmts);
    renderComments(itemId, cmts);
    return cmts;
  }).catch(e => {
    commentsLoading.delete(itemId);
    console.error(e);
    return [];
  }).finally(() => {
    commentPromises.delete(itemId);
  });
  commentPromises.set(itemId, promise);
  return localCached || promise;
}

function renderComments(itemId, cmts) {
  if (curId !== itemId) return;
  const roots = cmts.filter(c => !c.parent_id);
  const replies = cmts.filter(c => c.parent_id);
  const cnt = document.getElementById('_cmt-cnt');
  if (cnt) cnt.textContent = cmts.length;
  if (curItem) {
    curItem.commentCount = cmts.length;
    cachedItems = cachedItems.map(i => i.id === curItem.id ? { ...i, commentCount: cmts.length } : i);
  }
  const list = document.getElementById('_dcl');
  if (!list) return;
  list.innerHTML = roots.length
    ? roots.map(c => cmtHTML(c, replies.filter(r => r.parent_id === c.id))).join('')
    : '<p style="font-size:13px;color:var(--text3);font-weight:700;">첫 댓글을 남겨보세요!</p>';
}

  const b2 = document.getElementById('_wb2');
  if (b1) { b1.textContent = liked ? '❤️' : '🤍'; b1.className = 'hbtn' + (liked ? ' hbtn-pink' : ''); }
  if (b2) { b2.textContent = liked ? '❤️' : '🤍'; b2.className = 'wish-btn' + (liked ? ' on' : ''); }
}

/* ════════════════════════════════
   마이페이지
════════════════════════════════ */
async function renderMy() {
  const allItems = cachedItems.length ? cachedItems : await fetchItems();
  cachedItems = allItems;
  if (!likedItemIdsReady) {
    likedItemIds = await fetchLikedItemIds(allItems);
    likedItemIdsReady = true;
  }
  const mine = allItems.filter(i => i.seller_name === myN);

  let tabList = myTab === 'selling' ? mine.filter(i => !i.sold)
    : myTab === 'sold' ? mine.filter(i => i.sold)
    : allItems.filter(i => likedItemIds.has(i.id));

  const msgs = {
    selling: '아직 판매중인 상품이 없어요<br>팔기 버튼으로 올려봐요!',
    sold: '판매완료 내역이 없어요',
    wish: '찜한 상품이 없어요',
  };

  document.getElementById('s-my').innerHTML = `
  <div class="sub-hdr">
    <div class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true" style="font-size:16px;"></i></div>
    <span class="sub-title">마이페이지</span>
  </div>
  <div class="prof-card">
    <div class="prof-av-wrap" onclick="document.getElementById('f-edit').click()">
      <div class="prof-av">${av(myP, myN, 52)}</div>
      <div class="prof-cam"><i class="ti ti-camera" aria-hidden="true" style="font-size:9px;"></i></div>
    </div>
    <div class="prof-info"><h3>${myN}</h3><p>구로구마켓 회원</p></div>
    <button class="edit-nick-btn" onclick="document.getElementById('_enf').classList.toggle('open');document.getElementById('_nei').value=myN">수정</button>
  </div>
  <div class="edit-form" id="_enf">
    <div class="edit-label">닉네임 변경</div>
    <div class="edit-row">
      <input type="text" id="_nei" maxlength="10">
      <button class="save-btn" onclick="saveNick()">저장</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n">${mine.filter(i => !i.sold).length}</div><div class="stat-l">판매중</div></div>
    <div class="stat"><div class="stat-n">${mine.filter(i => i.sold).length}</div><div class="stat-l">판매완료</div></div>
    <div class="stat"><div class="stat-n">-</div><div class="stat-l">찜한 상품</div></div>
  </div>
  <div class="my-tabs">
    <div class="my-tab${myTab === 'selling' ? ' on' : ''}" onclick="myTab='selling';renderMy()">🏷️ 판매중</div>
    <div class="my-tab${myTab === 'sold' ? ' on' : ''}" onclick="myTab='sold';renderMy()">✅ 판매완료</div>
    <div class="my-tab${myTab === 'wish' ? ' on' : ''}" onclick="myTab='wish';renderMy()">❤️ 찜 목록</div>
  </div>
  <div class="my-body" id="_mybody">
    ${myTab !== 'wish'
      ? (tabList.length
          ? tabList.map(i => itemRowH(i)).join('')
          : `<div class="empty-my">${msgs[myTab]}</div>`)
      : '<div class="loading"><div class="spin"></div></div>'}
  </div>`;

  if (myTab === 'wish') {
    likedItemIds = await fetchLikedItemIds(allItems);
    likedItemIdsReady = true;
    const wished = allItems.filter(i => likedItemIds.has(i.id));
    document.getElementById('_mybody').innerHTML = wished.length
      ? wished.map(i => itemRowH(i)).join('')
      : `<div class="empty-my">${msgs.wish}</div>`;
  }
}

function itemRowH(i) {
  const pt = i.sold ? 'sp-off' : 'sp-on';
  const ptxt = i.sold ? '판매완료' : '판매중';
  return `<div class="item-row" onclick="openDet('${i.id}')">
    <div class="item-row-em">${itemMedia(i.emoji, i.category)}</div>
    <div class="item-row-info">
      <div class="item-row-name">${i.title}</div>
      <div class="item-row-price">${i.price.toLocaleString()}원</div>
      <div class="item-row-meta">${relTime(i.created_at)} · ❤️ ${i.likeCount}</div>
    </div>
    <span class="status-pill ${pt}">${ptxt}</span>
  </div>`;
}

function saveNick() {
  const v = document.getElementById('_nei').value.trim(); if (!v) return;
  myN = v; saveProfile(); renderMy(); toast('닉네임을 변경했어요');
}

/* ════════════════════════════════
   판매 등록
════════════════════════════════ */
function renderSell(item = null) {
  editingItemId = item?.id || null;
  const itemMediaPayload = item ? (itemRecordPayload(item) || item.emoji) : '';
  itemPhotos = item ? itemPhotoList(itemMediaPayload) : [];
  itemThumbs = item ? itemThumbList(itemMediaPayload) : [];
  const edit = !!item;
  const cats = ['의류', '전자기기', '도서', '생활용품', '취미', '식물', '기타'];
  document.getElementById('s-sell').innerHTML = `
  <div class="sub-hdr">
    <div class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true" style="font-size:16px;"></i></div>
    <span class="sub-title">${edit ? '상품 수정' : '물건 올리기'}</span>
  </div>
  <div class="sell-body">
    <div class="fr"><label>사진</label><div class="img-zone" id="_itemphoto" onclick="document.getElementById('f-item').click()"><i class="ti ti-camera" aria-hidden="true" style="font-size:20px;"></i> 사진을 올려주세요</div></div>
    <div class="fr"><label>제목 *</label><input type="text" id="_nt" placeholder="물건 이름" value="${esc(item?.title)}"></div>
    <div class="fr"><label>카테고리</label>
      <select id="_nc">${cats.map(c => `<option${item?.category === c ? ' selected' : ''}>${c}</option>`).join('')}</select>
    </div>
    <div class="fr"><label>가격 (원) *</label><input type="number" id="_np" placeholder="예) 15000" value="${item?.price || ''}"></div>
    <div class="fr"><label>설명</label><textarea id="_nd" placeholder="상태, 구매 시기, 직거래 여부 등을 적어 주세요">${esc(item?.description)}</textarea></div>
    <button class="reg-btn" id="_regbtn" onclick="${edit ? 'doUpdateItem()' : 'doAddItem()'}">${edit ? '수정하기' : '등록하기'}</button>
  </div>`;
  renderItemPhotoZone();
}

function renderItemPhotoZone() {
  const z = document.getElementById('_itemphoto');
  if (!z) return;
  z.className = 'img-zone' + (itemPhotos.length ? ' has-img' : '');
  z.innerHTML = itemPhotos.length
    ? itemPhotos.map((p, idx) => `<div class="photo-preview"><img src="${p}" alt="상품 사진 ${idx + 1}"></div>`).join('')
    : `<i class="ti ti-camera" aria-hidden="true" style="font-size:20px;"></i> 사진을 올려주세요`;
}

async function doAddItem() {
  const t = document.getElementById('_nt').value.trim();
  const p = parseInt(document.getElementById('_np').value) || 0;
  const c = document.getElementById('_nc').value;
  const d = document.getElementById('_nd').value.trim();
  if (!t || !p) { toast('제목과 가격을 입력해 주세요'); return; }
	  const btn = document.getElementById('_regbtn');
	  btn.textContent = '등록 중...'; btn.disabled = true;
	  try {
	    const uploaded = await uploadItemImages(itemPhotos, itemThumbs);
	    await insertItem({
	      title: t, price: p, category: c, description: d,
	      emoji: emM[c] || '📦',
	      photoUrls: uploaded.photoUrls,
	      thumbnailUrl: uploaded.thumbnailUrl,
	    });
	    toast('상품이 등록됐어요 🎉');
    statF = '판매중'; catF = '전체';
    goBack();
    await renderMain('');
  } catch (e) {
    toast('등록에 실패했어요. 다시 시도해 주세요.');
    btn.textContent = '등록하기'; btn.disabled = false;
  }
}

async function doUpdateItem() {
  if (!editingItemId || !curItem) return;
  const t = document.getElementById('_nt').value.trim();
  const p = parseInt(document.getElementById('_np').value) || 0;
  const c = document.getElementById('_nc').value;
  const d = document.getElementById('_nd').value.trim();
  if (!t || !p) { toast('제목과 가격을 입력해 주세요'); return; }
	  const btn = document.getElementById('_regbtn');
	  btn.textContent = '수정 중...'; btn.disabled = true;
	  try {
	    const uploaded = await uploadItemImages(itemPhotos, itemThumbs);
	    const patch = {
	      title: t, price: p, category: c, description: d,
	      emoji: emM[c] || '📦',
	      photoUrls: uploaded.photoUrls,
	      thumbnailUrl: uploaded.thumbnailUrl,
	    };
	    await updateItem(editingItemId, patch);
	    const mediaPatch = {
	      ...patch,
	      photo_urls: uploaded.photoUrls,
	      thumbnail_url: uploaded.thumbnailUrl,
	      emoji: itemPayload(uploaded.photoUrls, c, uploaded.thumbnailUrl ? [uploaded.thumbnailUrl] : []),
	    };
	    curItem = { ...curItem, ...mediaPatch, seller_photo: myP };
	    cachedItems = cachedItems.map(i => i.id === editingItemId ? { ...i, ...mediaPatch, seller_photo: myP } : i);
    toast('상품을 수정했어요');
    await renderDet();
    goBack();
  } catch (e) {
    console.error(e);
    toast('수정에 실패했어요. 다시 시도해 주세요.');
    btn.textContent = '수정하기'; btn.disabled = false;
  }
}

/* ── 시작 ── */
if (myN) {
  renderMain();
  document.getElementById('s-nick').className = 'screen right';
  document.getElementById('s-main').className = 'screen active';
  screenHistory = ['s-main'];
} else {
  renderNick();
}
</script>
</body>
</html>
